title: Suspicious /etc/passwd and /etc/shadow Enumeration
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: Detects attempts to read sensitive credential files indicating reconnaissance
author: Your Name - Cybersecurity Capstone Project
date: 2026/07/08
tags:
    - attack.credential_access
    - attack.t1003.008
logsource:
    product: linux
    service: auditd
detection:
    selection:
        data|contains:
            - '/etc/shadow'
            - '/etc/gshadow'
falsepositives:
    - System administrators performing audits
    - Backup tools
level: high
